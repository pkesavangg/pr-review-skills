# Lefthook configuration — managed pre-commit and commit-msg hooks
# Install: brew install lefthook detekt && lefthook install
# Docs: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    detekt:
      glob: "**/*.kt"
      run: |
        detekt \
          --input "$(echo {staged_files} | tr ' ' ',')" \
          --config Android/config/detekt/detekt.yml \
          --baseline Android/config/detekt/detekt-baseline.xml
      skip:
        - merge
        - rebase
      fail_text: |
        Detekt violations found.
        Run: cd Android && ./gradlew detektBaseline (to update baseline for pre-existing issues)
        Or fix the violations in your code.

    swiftlint:
      glob: "iOS/**/*.swift"
      run: |
        if command -v swiftlint &>/dev/null; then
          swiftlint lint --config iOS/.swiftlint.yml --quiet --reporter xcode {staged_files}
        else
          echo "Warning: SwiftLint not installed — skipping iOS lint gate (brew install swiftlint)"
        fi
      skip:
        - merge
        - rebase
      fail_text: |
        SwiftLint errors in staged Swift files (includes the custom snapshot-boundary
        and accessibility rules). Fix them, or run /swiftlint to auto-fix the correctable ones.
        To bypass: git commit --no-verify

    gitleaks:
      run: |
        if command -v gitleaks &>/dev/null; then
          gitleaks protect --staged --no-banner --verbose
        else
          echo "Warning: Gitleaks not installed — skipping secrets scan (brew install gitleaks)"
        fi
      skip:
        - merge
        - rebase
      fail_text: "Secrets detected in staged files. Remove them before committing."

    testtags:
      glob: "Android/app/src/main/**/*.kt"
      run: bash scripts/check-testtags.sh
      skip:
        - merge
        - rebase
      fail_text: |
        Inline-literal testTag found. Tag from a TestTags constant instead
        (Modifier.testTag(TestTags.X.Y)). See Android/docs/accessibility-testtags-guide.md.

commit-msg:
  commands:
    jira-ticket:
      run: |
        MSG=$(cat {1})
        if echo "$MSG" | head -1 | grep -qE "^(Merge|fixup!|squash!|Revert) "; then
          exit 0
        fi
        if ! echo "$MSG" | grep -qE "[A-Z]+-[0-9]+"; then
          echo ""
          echo "Commit message must include a JIRA ticket reference (e.g. MA-1234, MOB-422)"
          echo "   Your message: $(head -1 {1})"
          echo "   To bypass: git commit --no-verify"
          exit 1
        fi
