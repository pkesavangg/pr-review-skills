# ============================================
# Common Exclusions
# Directories/files excluded from linting
# ============================================
excluded:
  - Pods                    # CocoaPods dependencies
  - Carthage                # Carthage dependencies
  - DerivedData             # Xcode build artifacts
  - .build                  # Swift Package Manager build artifacts
  - SourcePackages          # SPM dependencies

# ============================================
# Common Disabled Rules
# Rules that are completely disabled
# ============================================
disabled_rules:
  - trailing_whitespace  # Often handled by formatters (Xcode, SwiftFormat)

# ============================================
# Common Opt-In Rules
# Rules that must be explicitly enabled
# ============================================
opt_in_rules:
  - empty_count                    # Prefer isEmpty over count == 0 (isEmpty is O(1), count can be O(n))
  - empty_string                   # Prefer isEmpty over == "" (more idiomatic Swift)
  - force_unwrapping               # Warn about force unwraps (!) - can crash if nil
  - closure_spacing                # Enforce spacing around closures: map { } not map{}
  - sorted_imports                 # Sort import statements alphabetically
  - contains_over_filter_count     # Prefer contains(where:) over filter{}.count > 0 (performance)
  - contains_over_filter_is_empty # Prefer !contains(where:) over filter{}.isEmpty (performance)
  - first_where                    # Prefer first(where:) over filter{}.first (stops at first match)
  - last_where                     # Prefer last(where:) over filter{}.last (stops at last match)
  - multiline_arguments            # Enforce multiline formatting for long argument lists
  - multiline_parameters           # Enforce multiline formatting for long parameter lists
  - operator_usage_whitespace      # Require spaces around operators: a + b not a+b
  - redundant_nil_coalescing      # Remove unnecessary ?? nil (optional is already optional)
  - redundant_type_annotation     # Remove unnecessary type annotations (let x: Int = 5 -> let x = 5)
  - sorted_first_last             # Warn if using first/last without sorting when order matters
  - static_operator               # Prefer static func for operator overloads
  - toggle_bool                   # Prefer toggle() over isEnabled = !isEnabled
  - trailing_closure              # Prefer trailing closure syntax: map { } not map({ })
  - unneeded_parentheses_in_closure_argument  # Remove () in closure args: { x in } not { (x) in }
  - vertical_parameter_alignment_on_call      # Align parameters vertically in function calls

# ============================================
# Force Operations - Set as Errors (HIPAA)
# Force operations can crash and expose PHI in crash logs - must be errors
# ============================================
force_cast: error          # Error on force cast (as!) - use optional cast (as?) instead
force_try: error           # Error on force try (try!) - use do/catch or try? instead
force_unwrapping: error    # Error on force unwrap (!) - use guard/if let instead

# ============================================
# Code Style Rules
# Limits and thresholds for code organization
# ============================================

# Line length - Max characters per line
line_length:
  warning: 150                                    # Warn if line exceeds 150 chars
  error: 200                                      # Error if line exceeds 200 chars
  ignores_urls: true                             # Don't count URLs in length
  ignores_function_declarations: true            # Don't count function declarations
  ignores_comments: true                         # Don't count comments

# File length - Max lines per file
file_length:
  warning: 500                    # Warn if file exceeds 500 lines
  error: 1000                     # Error if file exceeds 1000 lines
  ignore_comment_only_lines: true # Don't count comment-only lines

# Type body length - Max lines in class/struct/enum body
type_body_length:
  warning: 500                    # Warn if type body exceeds 500 lines
  error: 1000                     # Error if type body exceeds 1000 lines

# Function body length - Max lines in function body
function_body_length:
  warning: 50                     # Warn if function exceeds 50 lines
  error: 100                      # Error if function exceeds 100 lines

# Function parameter count - Max number of parameters
function_parameter_count:
  warning: 5                      # Warn if function has more than 5 parameters
  error: 8                        # Error if function has more than 8 parameters

# Cyclomatic complexity - Measures code complexity (if/else, loops, etc.)
cyclomatic_complexity:
  warning: 10                     # Warn if complexity exceeds 10
  error: 20                       # Error if complexity exceeds 20

# Nesting depth - Max levels of nesting
nesting:
  type_level: 2                   # Max nested types (class in class in class)
  function_level: 3               # Max nested blocks (if in if in if)

# ============================================
# Naming Rules
# Enforce consistent naming conventions
# ============================================

# Type names - Rules for classes, structs, enums, protocols
type_name:
  min_length:
    warning: 3                    # Warn if type name shorter than 3 chars (e.g., "A")
    error: 2                      # Error if type name shorter than 2 chars
  max_length:
    warning: 50                   # Warn if type name longer than 50 chars
    error: 60                     # Error if type name longer than 60 chars
  excluded:                       # Exceptions to length rules (common abbreviations)
    - id                          # Common identifier type
    - URL                         # Uniform Resource Locator
    - API                         # Application Programming Interface
    - ID                          # Identifier
    - OK                          # Common return status
    - iOS                         # Operating system name
    - OS                          # Operating System
    - UUID                        # Universally Unique Identifier
    - TV                          # Television/Type Variable
    - URLSession                  # Foundation class
    - URLRequest                  # Foundation class
    - URLResponse                 # Foundation class

# Identifier names - Rules for variables, functions, properties
identifier_name:
  min_length:
    warning: 2                    # Warn if identifier shorter than 2 chars (e.g., "a")
    error: 2                     # Error if identifier shorter than 2 chars (e.g., "a")
  max_length:
    warning: 50                  # Warn if identifier longer than 50 chars
    error: 60                    # Error if identifier longer than 60 chars
  excluded:                      # Exceptions to length rules (common short names)
    - id                         # Common identifier variable
    - x                          # Common coordinate/loop variable
    - y                          # Common coordinate variable
    - z                          # Common coordinate/loop variable
    - i                          # Common loop index
    - j                          # Common nested loop index
    - k                          # Common loop index
    - URL                        # Uniform Resource Locator
    - API                        # Application Programming Interface
    - ok                         # Common boolean/status variable
    - no                         # Common boolean variable
    - A3                         # Bluetooth protocol specification name
    - A6                         # Bluetooth protocol specification name
    - R4                         # Bluetooth protocol specification name
    - R4ScaleSetup               # Enum case matching R4 scale protocol naming convention

# ============================================
# General Settings
# SwiftLint behavior configuration
# ============================================

# Don't fail if no lintable files found
allow_zero_lintable_files: false  # Fail build if no Swift files to lint (ensures linting runs)

# Treat all warnings as errors (useful for CI)
strict: false                      # If true, warnings become errors (useful for CI/CD)

# Reporter format - How SwiftLint outputs results
reporter: "xcode"                  # Format output for Xcode (shows inline in editor)

# Check for SwiftLint updates
check_for_updates: true            # Check if newer SwiftLint version is available

# ============================================
# Custom Rules — HIPAA Security Compliance
# Prevent unsafe logging, storage, and credential practices
# ============================================
custom_rules:
  no_print_or_nslog:
    name: "No print() or NSLog()"
    regex: '\bprint\s*\(|NSLog\s*\('
    match_kinds:
      - identifier
    message: "Use LoggerService instead of print()/NSLog() — HIPAA compliance"
    severity: error

  no_direct_userdefaults:
    name: "No direct UserDefaults access"
    regex: 'UserDefaults'
    match_kinds:
      - identifier
      - typeidentifier
    message: "Use KvStorageService or KeychainService instead of direct UserDefaults — HIPAA compliance"
    severity: error
    excluded:
      - "meApp/Core/Services/KvStorageService.swift"
      - "meApp/Data/Services/AccountMigrationService.swift"

  no_hardcoded_credentials:
    name: "No hardcoded credentials"
    regex: '(?i)(apiKey|apiSecret|secretKey|privateKey|accessKey|accessToken|authToken|bearerToken|clientSecret)\s*[:=]\s*"[^"]+"'
    message: "Do not hardcode credentials in source code — HIPAA compliance"
    severity: error

# ============================================
# Custom Rules — Snapshot Boundary Enforcement
# Feature code must use value-type snapshots (AccountSnapshot / DeviceSnapshot / EntrySnapshot),
# never the SwiftData @Model types. Rationale: @Model objects are not Sendable, and reading
# their properties off the main actor caused production EXC_BAD_ACCESS crashes (v5.0 Build 19).
# ============================================
  no_published_swiftdata_model:
    name: "Snapshot, not @Model, in @Published"
    regex: '@Published[^:\n]*:\s*\[?(Account|Device|Entry)\b(?!Snapshot|MetaData|Ephemeral|Type|Flag|Source|Unit|Notification|Data)'
    message: "Publish AccountSnapshot / DeviceSnapshot / EntrySnapshot — not the SwiftData @Model. The @Model must not cross the service boundary. See iOS/CLAUDE.md §Key Decisions and docs/account-snapshot-implementation.md."
    severity: error
    excluded:
      - "meApp/Data/Services/AccountService.swift"
      - "meApp/Data/Services/ScaleService.swift"
      - "meApp/Data/Services/EntryService.swift"
      - "meApp/Data/Services/BluetoothService"
      - "meApp/Data/Storage"
      - "meApp/Data/API"
      - "meApp/Domain/Models/DB"
      - "meApp/Core/Services/SwiftDataWorker.swift"

  no_unchecked_sendable_with_model:
    name: "@unchecked Sendable hiding a SwiftData @Model"
    regex: '@unchecked\s+Sendable[\s\S]{0,400}?\b(Account|Device|Entry)\b(?!Snapshot|MetaData|Ephemeral|Type|Flag|Source|Unit|Notification|Data)'
    message: "@unchecked Sendable on a type holding a SwiftData @Model is an actor-safety lie. Convert the held value to a snapshot (AccountSnapshot / DeviceSnapshot / EntrySnapshot) and drop @unchecked."
    severity: error
    excluded:
      - "meApp/Domain/Models/DB"
      - "meAppTests"
      - "meAppUITests"

# ============================================
# Custom Rules — Accessibility-for-automation (MOB-1131 / MOB-1132)
# Every interactive control needs a stable accessibilityIdentifier (== Android testTag)
# so a single Appium `~snake_case` selector resolves it. Screen-root ids must NOT be a
# bare identifier on a container — that bleeds onto child controls (the MOB-1132 gate bug).
# The semantic "interactive control has a label but no identifier" check lives in the
# `review-accessibility` review skill (it needs code context a regex can't see) and runs
# via the post-change-guard.
# ============================================
  accessibility_id_on_screen_root:
    name: "Use screenAccessibilityRoot(_:) for screen-root ids"
    regex: '\.accessibilityIdentifier\(\s*(?:AccessibilityID\.)?\w*[Ss]creenRoot\b'
    message: "Do not put a screen-root id on a container via a bare .accessibilityIdentifier — it propagates onto child controls and overrides their ids (MOB-1132). Use .screenAccessibilityRoot(_:) instead."
    severity: error
    excluded:
      - "meApp/Core/Extensions/View + Extension.swift"

  accessibility_identifier_string_literal:
    name: "accessibilityIdentifier should use an AccessibilityID constant"
    regex: '\.accessibilityIdentifier\(\s*"'
    message: "Tag controls with an AccessibilityID constant via .appAccessibility(id:) — not an inline string literal — so the app and meAppUITests share one id source (MOB-1133)."
    severity: warning
    excluded:
      - "meApp/Core/Extensions/View + Extension.swift"
