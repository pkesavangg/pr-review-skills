syntax = "proto3";

option java_package = "com.dmdbrands.gurus.weight.proto";
option java_multiple_files = true;

message VisibleMetrics {
    map<string, VisibleKeys> account_metric_map = 1; // accountId → visible keys
}

message VisibleKeys {
    repeated MetricKey visible_metric_keys = 1;
    repeated MilestoneKey visible_milestone_keys = 2;
}

enum MetricKey {
    WEIGHT = 0;
    BMI = 1;
    BODY_FAT = 2;
    MUSCLE_MASS = 3;
    BODY_WATER = 4;
    HEART_RATE = 5;
    BONE_MASS = 6;
    VISCERAL_FAT = 7;
    SUBCUTANEOUS_FAT = 8;
    PROTEIN = 9;
    SKELETAL_MUSCLE = 10;
    BMR = 11;
    METABOLIC_AGE = 12;
}

enum MilestoneKey {
    TO_GOAL = 0;            // -13.2 lbs to goal
    CURRENT_STREAK = 1;     // 1 day
    LONGEST_STREAK = 2;     // 10 day
    PER_WEEK = 3;           // -1 lbs/week
    PER_MONTH = 4;          // -10 lbs/month
    PER_YEAR = 5;           // -20 lbs/year
    TOTAL_CHANGE = 6;       // -30 lbs/total
}
