build:
  maxIssues: 0

complexity:
  LongMethod:
    active: true
    threshold: 60
    # Compose @Preview functions are dev-only sample scaffolding, not production code —
    # exempt them from the line limit rather than hand-splitting sample data. (MOB-1556)
    ignoreAnnotated: ['Preview', 'PreviewTheme']
  LargeClass:
    active: true
    threshold: 600

exceptions:
  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - "InterruptedException"
      - "MalformedURLException"
      - "NumberFormatException"
      - "ParseException"

style:
  ForbiddenComment:
    active: true
    comments:
      - "TODO:"
      - "FIXME:"
      - "STOPSHIP:"
  ForbiddenImport:
    active: true
    imports:
      - "kotlinx.coroutines.runBlocking"

potential-bugs:
  UnsafeCallOnNullableType:
    active: true

coroutines:
  GlobalCoroutineUsage:
    active: true
