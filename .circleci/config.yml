version: 2.1

orbs:
  macos: circleci/macos@2.0.0

commands:
  restore_google_services:
    description: Decode the google-services.json secret into the Android app module.
    steps:
      - run:
          name: Restore google-services.json
          command: |
            if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
              echo "Error: GOOGLE_SERVICES_JSON_BASE64 is not set. Add it as a CircleCI project/context secret."
              exit 1
            fi
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > Android/app/google-services.json
            echo "google-services.json restored."

  setup_github_packages_auth:
    description: >
      Map the GitHub Packages token into GITHUB_TOKEN so Gradle can resolve the
      private com.dmdbrands.lib:* artifacts hosted on maven.pkg.github.com.
      settings.gradle.kts reads GITHUB_USERNAME / GITHUB_TOKEN. GITHUB_USERNAME
      is a CircleCI env var (read natively by Gradle); the token comes from
      GITHUB_PACKAGES_TOKEN (the read:packages token, shared with iOS SPM auth).
    steps:
      - run:
          name: Configure GitHub Packages credentials
          command: |
            if [ -z "$GITHUB_USERNAME" ] || [ -z "$GITHUB_PACKAGES_TOKEN" ]; then
              echo "Error: GITHUB_USERNAME and/or GITHUB_PACKAGES_TOKEN is not set. Add them as CircleCI project/context env vars — the GitHub username and a token with read:packages access to the private dmdbrands / gg-engineering Maven packages."
              exit 1
            fi
            echo "export GITHUB_TOKEN=\"$GITHUB_PACKAGES_TOKEN\"" >> "$BASH_ENV"
            echo "GitHub Packages credentials configured for Gradle."
      - run:
          name: Probe GitHub Packages access (diagnostic)
          command: |
            # Non-fatal probe so opaque 401s self-explain. Gradle remains the gate.
            URL="https://maven.pkg.github.com/dmdbrands/ggBluetoothNativeLibrary/com/dmdbrands/lib/gg-bluetooth-android/1.6.10/gg-bluetooth-android-1.6.10.pom"
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -u "$GITHUB_USERNAME:$GITHUB_PACKAGES_TOKEN" "$URL" || echo "000")
            echo "GitHub Packages probe -> HTTP $CODE"
            case "$CODE" in
              200|302) echo "OK: token can read GitHub Packages." ;;
              401) echo "401: token is MISSING the 'read:packages' scope. A classic PAT needs read:packages + repo; 'repo' alone is not enough (git clone works, package download does not)." ;;
              403) echo "403: scope is present but blocked — authorize the token for SAML SSO on BOTH the dmdbrands and gg-engineering orgs." ;;
              404) echo "404: authenticated OK (token works) but artifact/path not found — check coordinates." ;;
              *)   echo "Unexpected status $CODE (network/proxy?)." ;;
            esac

jobs:
  # ===========================================================
  # Job 1: Gitleaks Secrets Scan
  # ===========================================================
  gitleaks:
    docker:
      - image: cimg/base:current
    resource_class: small
    steps:
      - checkout
      - run:
          name: Install Gitleaks
          command: |
            GITLEAKS_VERSION=8.21.2
            curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar -xz -C /tmp gitleaks
            sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
            gitleaks version
      - run:
          name: Secrets scan (Gitleaks)
          command: gitleaks detect --no-banner

  # ===========================================================
  # Job 2: SwiftLint Static Analysis
  # ===========================================================
  swiftlint:
    macos:
      xcode: "16.4.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - run:
          name: Skip if no iOS changes
          command: |
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only HEAD)
            if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qE "^iOS/|^\.circleci/"; then
              echo "No iOS changes detected, skipping job."
              circleci-agent step halt
            fi
      - run:
          name: Install SwiftLint
          command: brew install swiftlint
      - run:
          name: Run SwiftLint
          working_directory: iOS
          command: swiftlint --strict --reporter emoji

  # ===========================================================
  # Job 3: iOS Build
  # ===========================================================
  build:
    macos:
      xcode: "16.4.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - run:
          name: Skip if no iOS changes
          command: |
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only HEAD)
            if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qE "^iOS/|^\.circleci/"; then
              echo "No iOS changes detected, skipping job."
              circleci-agent step halt
            fi
      - run:
          name: Restore GoogleService-Info.plist
          command: |
            if [ -z "$GOOGLESERVICE_INFO_BASE64" ]; then
              echo "Error: GOOGLESERVICE_INFO_BASE64 is not set. Add it as a CircleCI project/context secret (base64-encoded GoogleService-Info.plist)."
              exit 1
            fi
            if ! echo "$GOOGLESERVICE_INFO_BASE64" | base64 -D > iOS/meApp/Resources/GoogleService-Info.plist; then
              echo "Error: Failed to decode GOOGLESERVICE_INFO_BASE64. Ensure it is valid base64-encoded GoogleService-Info.plist."
              exit 1
            fi
            if ! plutil -lint iOS/meApp/Resources/GoogleService-Info.plist >/dev/null 2>&1; then
              echo "Error: Decoded GoogleService-Info.plist is not valid XML/plist. Check the GOOGLESERVICE_INFO_BASE64 secret."
              exit 1
            fi
            echo "GoogleService-Info.plist restored and validated."
      - run:
          name: Show Xcode version
          command: xcodebuild -version
      - run:
          name: Authenticate to private gg-engineering Swift packages
          command: |
            # The app depends on private SPM packages (ggAppSyncPackage,
            # ggBluetoothNativeLibrary, ggHealthKitPackage,
            # ggInAppMessagingPackage, ggWifiScalePackage). CI has no GitHub
            # credentials by default, so SPM clones return "Repository not
            # found". Inject a read-only token for all github.com HTTPS clones.
            if [ -z "$GITHUB_PACKAGES_TOKEN" ]; then
              echo "Error: GITHUB_PACKAGES_TOKEN is not set. Add it as a CircleCI project/context secret — a GitHub token with read access to the private gg-engineering Swift packages."
              exit 1
            fi
            git config --global url."https://x-access-token:${GITHUB_PACKAGES_TOKEN}@github.com/".insteadOf "https://github.com/"
            echo "Configured git to authenticate github.com HTTPS clones."
      - run:
          name: Resolve Swift Package Dependencies
          working_directory: iOS
          no_output_timeout: 30m
          command: |
            xcodebuild -resolvePackageDependencies \
              -project meApp.xcodeproj
      - run:
          name: Build project
          working_directory: iOS
          no_output_timeout: 30m
          command: |
            xcodebuild build \
              -project meApp.xcodeproj \
              -scheme meApp \
              -destination 'generic/platform=iOS' \
              -configuration Debug \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ENABLE_USER_SCRIPT_SANDBOXING=NO

  # ===========================================================
  # Job 4: Unit Tests with Code Coverage
  # NOTE: Commented out — simulator not supported due to library
  # compatibility issue (requires physical device). Uncomment
  # when simulator support is restored.
  # ===========================================================
  # unit-tests:
  #   macos:
  #     xcode: "16.4.0"
  #   resource_class: m4pro.medium
  #   steps:
  #     - checkout
  #     - run:
  #         name: Restore GoogleService-Info.plist
  #         command: |
  #           if [ -z "$GOOGLESERVICE_INFO_BASE64" ]; then
  #             echo "Error: GOOGLESERVICE_INFO_BASE64 is not set."
  #             exit 1
  #           fi
  #           echo "$GOOGLESERVICE_INFO_BASE64" | base64 -D > iOS/meApp/Resources/GoogleService-Info.plist
  #     - run:
  #         name: Resolve Swift Package Dependencies
  #         working_directory: iOS
  #         command: |
  #           xcodebuild -resolvePackageDependencies \
  #             -project meApp.xcodeproj
  #     - run:
  #         name: Boot Simulator
  #         command: |
  #           xcrun simctl boot "iPhone 16" || true
  #     - run:
  #         name: Run Unit Tests with Coverage
  #         working_directory: iOS
  #         command: |
  #           xcodebuild test \
  #             -project meApp.xcodeproj \
  #             -scheme meApp \
  #             -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
  #             -only-testing:meAppTests \
  #             -enableCodeCoverage YES \
  #             -resultBundlePath TestResults.xcresult \
  #             CODE_SIGN_IDENTITY="" \
  #             CODE_SIGNING_REQUIRED=NO \
  #             CODE_SIGNING_ALLOWED=NO \
  #             ENABLE_USER_SCRIPT_SANDBOXING=NO
  #     - run:
  #         name: Check Coverage Threshold (80%)
  #         working_directory: iOS
  #         command: |
  #           COVERAGE=$(xcrun xccov view --report --json TestResults.xcresult \
  #             | python3 -c "import sys,json; print(f'{json.load(sys.stdin)[\"lineCoverage\"]*100:.1f}')")
  #           echo "Code coverage: ${COVERAGE}%"
  #           if (( $(echo "$COVERAGE < 80" | bc -l) )); then
  #             echo "ERROR: Coverage ${COVERAGE}% is below 80% threshold"
  #             exit 1
  #           fi
  #     - store_test_results:
  #         path: iOS/TestResults.xcresult
  #     - store_artifacts:
  #         path: iOS/TestResults.xcresult
  #         destination: test-results

  # ===========================================================
  # Job 5: Dependency Audit
  # ===========================================================
  dependency-audit:
    macos:
      xcode: "16.4.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - run:
          name: Skip if no iOS changes
          command: |
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only HEAD)
            if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qE "^iOS/|^\.circleci/"; then
              echo "No iOS changes detected, skipping job."
              circleci-agent step halt
            fi
      - run:
          name: Audit SPM Dependencies
          working_directory: iOS
          command: |
            if [ -f "meApp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved" ]; then
              RESOLVED="meApp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved"
            elif [ -f "Package.resolved" ]; then
              RESOLVED="Package.resolved"
            else
              echo "No Package.resolved found, skipping dependency audit"
              exit 0
            fi
            echo "Checking $RESOLVED for pinned versions..."
            python3 -c "
            import json, sys
            with open('$RESOLVED') as f:
                resolved = json.load(f)
            pins = resolved.get('pins', resolved.get('object', {}).get('pins', []))
            unpinned = []
            for pin in pins:
                pkg = pin.get('identity', pin.get('package', 'unknown'))
                state = pin.get('state', {})
                version = state.get('version') or state.get('revision', 'unpinned')
                if not state.get('version'):
                    unpinned.append(pkg)
                print(f'  {pkg}: {version}')
            if unpinned:
                print(f'\nWARNING: Unpinned dependencies: {', '.join(unpinned)}')
                sys.exit(1)
            print('\nAll dependencies are pinned.')
            "

  # ===========================================================
  # Job 6: Android Build
  # ===========================================================
  android-build:
    docker:
      - image: cimg/android:2024.11.1
    resource_class: large
    steps:
      - checkout
      - run:
          name: Skip if no Android changes
          command: |
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only HEAD)
            if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qE "^Android/|^\.circleci/"; then
              echo "No Android changes detected, skipping job."
              circleci-agent step halt
            fi
      - restore_cache:
          keys:
            - gradle-v1-{{ checksum "Android/gradle/libs.versions.toml" }}-{{ checksum "Android/app/build.gradle.kts" }}
            - gradle-v1-{{ checksum "Android/gradle/libs.versions.toml" }}-
            - gradle-v1-
      - restore_google_services
      - setup_github_packages_auth
      - run:
          name: Build Android debug APK
          working_directory: Android
          command: ./gradlew assembleDebug
      - save_cache:
          key: gradle-v1-{{ checksum "Android/gradle/libs.versions.toml" }}-{{ checksum "Android/app/build.gradle.kts" }}
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
            - ~/.gradle/build-cache

  # ===========================================================
  # Job 7: Android Lint
  # ===========================================================
  android-lint:
    docker:
      - image: cimg/android:2024.11.1
    resource_class: large
    steps:
      - checkout
      - run:
          name: Skip if no Android changes
          command: |
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only HEAD)
            if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qE "^Android/|^\.circleci/"; then
              echo "No Android changes detected, skipping job."
              circleci-agent step halt
            fi
      - restore_cache:
          keys:
            - gradle-v1-{{ checksum "Android/gradle/libs.versions.toml" }}-{{ checksum "Android/app/build.gradle.kts" }}
            - gradle-v1-{{ checksum "Android/gradle/libs.versions.toml" }}-
            - gradle-v1-
      - restore_google_services
      - setup_github_packages_auth
      - run:
          name: Run Android lint
          working_directory: Android
          command: ./gradlew lint
      - run:
          name: Run Detekt static analysis
          working_directory: Android
          command: ./gradlew detekt
      - store_artifacts:
          path: Android/app/build/reports/lint-results-debug.html
          destination: lint-reports
      - store_artifacts:
          path: Android/app/build/reports/detekt
          destination: detekt-reports

  # ===========================================================
  # Job 8: Android Unit Tests
  # ===========================================================
  android-test:
    docker:
      - image: cimg/android:2024.11.1
    resource_class: large
    steps:
      - checkout
      - run:
          name: Skip if no Android changes
          command: |
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only HEAD)
            if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qE "^Android/|^\.circleci/"; then
              echo "No Android changes detected, skipping job."
              circleci-agent step halt
            fi
      - restore_cache:
          keys:
            - gradle-v1-{{ checksum "Android/gradle/libs.versions.toml" }}-{{ checksum "Android/app/build.gradle.kts" }}
            - gradle-v1-{{ checksum "Android/gradle/libs.versions.toml" }}-
            - gradle-v1-
      - restore_google_services
      - setup_github_packages_auth
      - run:
          name: Run Android unit tests with coverage verification
          working_directory: Android
          command: ./gradlew test :app:jacocoTestReport :app:jacocoTestCoverageVerification
      - store_test_results:
          path: Android/app/build/test-results
      - store_artifacts:
          path: Android/app/build/reports/jacoco/jacocoTestReport/html
          destination: coverage-report

  # ===========================================================
  # Job 9: OWASP Dependency Vulnerability Scan (Android)
  # Runs weekly via scheduled-security workflow.
  # ===========================================================
  android-owasp-scan:
    docker:
      - image: cimg/android:2024.11.1
    resource_class: large
    steps:
      - checkout
      - restore_google_services
      - setup_github_packages_auth
      - run:
          name: Run OWASP Dependency Check
          working_directory: Android
          command: ./gradlew dependencyCheckAnalyze
          no_output_timeout: 30m
      - store_artifacts:
          path: Android/build/reports/dependency-check
          destination: owasp-reports

workflows:
  version: 2
  build-and-test:
    jobs:
      # --- Platform-agnostic ---
      - gitleaks
      # --- iOS jobs ---
      - swiftlint:
          filters:
            branches:
              only:
                - develop
                - main
                - /^MA-.*$/
                - /^MOB-.*$/
      - build:
          filters:
            branches:
              only:
                - develop
                - main
                - /^MA-.*$/
                - /^MOB-.*$/
      # Uncomment when simulator support is restored:
      # - unit-tests:
      #     requires:
      #       - build
      - dependency-audit:
          filters:
            branches:
              only:
                - develop
                - main
                - /^MA-.*$/
                - /^MOB-.*$/
      # --- Android jobs ---
      - android-build:
          filters:
            branches:
              only:
                - develop
                - main
                - /^MA-.*$/
                - /^MOB-.*$/
      - android-lint:
          filters:
            branches:
              only:
                - develop
                - main
                - /^MA-.*$/
                - /^MOB-.*$/
      - android-test:
          filters:
            branches:
              only:
                - develop
                - main
                - /^MA-.*$/
                - /^MOB-.*$/

  scheduled-security:
    triggers:
      - schedule:
          cron: "0 9 * * 1"
          filters:
            branches:
              only: main
    jobs:
      - android-owasp-scan
