version: 2.1

orbs:
  macos: circleci/macos@2.0.0

jobs:
  build:
    macos:
      xcode: "16.0.0"
    resource_class: macos.m1.medium.gen1
    steps:
      - checkout
      - run:
          name: Show Xcode version
          command: xcodebuild -version
      - run:
          name: Resolve Swift Package Dependencies
          working_directory: iOS
          command: |
            xcodebuild -resolvePackageDependencies \
              -project meApp.xcodeproj
      - run:
          name: Build project
          working_directory: iOS
          command: |
            xcodebuild build \
              -project meApp.xcodeproj \
              -scheme meApp \
              -destination 'generic/platform=iOS' \
              -configuration Debug \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ENABLE_USER_SCRIPT_SANDBOXING=NO

  unit-tests:
    macos:
      xcode: "16.0.0"
    resource_class: macos.m1.medium.gen1
    steps:
      - checkout
      - run:
          name: Resolve Swift Package Dependencies
          working_directory: iOS
          command: |
            xcodebuild -resolvePackageDependencies \
              -project meApp.xcodeproj
      - run:
          name: Boot Simulator
          command: |
            xcrun simctl boot "iPhone 16" || true
      - run:
          name: Run Unit Tests
          working_directory: iOS
          command: |
            xcodebuild test \
              -project meApp.xcodeproj \
              -scheme meApp \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              -only-testing:meAppTests \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ENABLE_USER_SCRIPT_SANDBOXING=NO

  ui-tests:
    macos:
      xcode: "16.0.0"
    resource_class: macos.m1.medium.gen1
    steps:
      - checkout
      - run:
          name: Resolve Swift Package Dependencies
          working_directory: iOS
          command: |
            xcodebuild -resolvePackageDependencies \
              -project meApp.xcodeproj
      - run:
          name: Boot Simulator
          command: |
            xcrun simctl boot "iPhone 16" || true
      - run:
          name: Run UI Tests
          working_directory: iOS
          command: |
            xcodebuild test \
              -project meApp.xcodeproj \
              -scheme meApp \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              -only-testing:meAppUITests \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ENABLE_USER_SCRIPT_SANDBOXING=NO

workflows:
  version: 2
  build-and-test:
    jobs:
      - build
      - unit-tests
      - ui-tests
