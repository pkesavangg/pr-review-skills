version: 2.1

orbs:
  macos: circleci/macos@2.0.0

commands:
  restore_google_services:
    description: Decode the google-services.json secret into the Android app module.
    steps:
      - run:
          name: Restore google-services.json
          command: |
            if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
              echo "Error: GOOGLE_SERVICES_JSON_BASE64 is not set. Add it as a CircleCI project/context secret."
              exit 1
            fi
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > Android/app/google-services.json
            echo "google-services.json restored."

  setup_github_packages_auth:
    description: >
      Map GITHUB_PACKAGES_TOKEN into GITHUB_TOKEN so Gradle can resolve the private
      com.dmdbrands.lib:* artifacts on maven.pkg.github.com (settings.gradle.kts
      reads GITHUB_USERNAME / GITHUB_TOKEN).
    steps:
      - run:
          name: Configure GitHub Packages credentials
          command: |
            if [ -z "$GITHUB_USERNAME" ] || [ -z "$GITHUB_PACKAGES_TOKEN" ]; then
              echo "Error: GITHUB_USERNAME and/or GITHUB_PACKAGES_TOKEN is not set. Add them as CircleCI project/context env vars."
              exit 1
            fi
            echo "export GITHUB_TOKEN=\"$GITHUB_PACKAGES_TOKEN\"" >> "$BASH_ENV"
            echo "GitHub Packages credentials configured for Gradle."
      - run:
          name: Probe GitHub Packages access (diagnostic)
          command: |
            # Non-fatal probe so opaque 401s self-explain. Gradle remains the gate.
            URL="https://maven.pkg.github.com/gg-engineering/ggBluetoothNativeLibrary/com/dmdbrands/lib/gg-bluetooth-android/1.6.10/gg-bluetooth-android-1.6.10.pom"
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -u "$GITHUB_USERNAME:$GITHUB_PACKAGES_TOKEN" "$URL" || echo "000")
            echo "GitHub Packages probe -> HTTP $CODE"
            case "$CODE" in
              200|302) echo "OK: token can read GitHub Packages." ;;
              401) echo "401: token is missing the 'read:packages' scope ('repo' alone is not enough)." ;;
              403) echo "403: token is not SSO-authorized for the gg-engineering org." ;;
              404) echo "404: authenticated OK but artifact/path not found." ;;
              *)   echo "Unexpected status $CODE (network/proxy?)." ;;
            esac

jobs:
  # gitleaks — secrets scan, runs on every branch
  gitleaks:
    docker:
      - image: cimg/base:current
    resource_class: small
    steps:
      - checkout
      - run:
          name: Install Gitleaks
          command: |
            GITLEAKS_VERSION=8.21.2
            curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar -xz -C /tmp gitleaks
            sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
            gitleaks version
      - run:
          name: Secrets scan (Gitleaks)
          # Scan the working tree (what ships), not full history — fast, and gates current code.
          command: gitleaks dir . --no-banner

  # ios-swiftlint — Swift static analysis, run independently of the build (see docs/circleci.md)
  ios-swiftlint:
    macos:
      xcode: "16.4.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - run:
          name: Skip if no iOS changes
          command: |
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only HEAD)
            if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qE "^iOS/|^\.circleci/"; then
              echo "No iOS changes detected, skipping job."
              circleci-agent step halt
            fi
      - run:
          name: Install SwiftLint
          # `brew install` does NOT upgrade an already-installed formula, so the SwiftLint
          # pre-baked into the Xcode image (older) would run instead of the version the
          # codebase is converged against. That version skew makes `--strict` flag/clear
          # different rules in CI vs. locally. Force the latest so lint is deterministic.
          command: |
            brew update
            brew upgrade swiftlint || brew install swiftlint
            swiftlint version
      - run:
          name: Run SwiftLint
          working_directory: iOS
          command: swiftlint --strict --reporter emoji

  # ios-build — compile the app for a generic iOS device
  ios-build:
    macos:
      xcode: "16.4.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - run:
          name: Skip if no iOS changes
          command: |
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only HEAD)
            if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qE "^iOS/|^\.circleci/"; then
              echo "No iOS changes detected, skipping job."
              circleci-agent step halt
            fi
      - run:
          name: Restore GoogleService-Info.plist
          command: |
            if [ -z "$GOOGLESERVICE_INFO_BASE64" ]; then
              echo "Error: GOOGLESERVICE_INFO_BASE64 is not set. Add it as a CircleCI project/context secret (base64-encoded GoogleService-Info.plist)."
              exit 1
            fi
            if ! echo "$GOOGLESERVICE_INFO_BASE64" | base64 -D > iOS/meApp/Resources/GoogleService-Info.plist; then
              echo "Error: Failed to decode GOOGLESERVICE_INFO_BASE64."
              exit 1
            fi
            if ! plutil -lint iOS/meApp/Resources/GoogleService-Info.plist >/dev/null 2>&1; then
              echo "Error: Decoded GoogleService-Info.plist is not valid XML/plist."
              exit 1
            fi
            echo "GoogleService-Info.plist restored and validated."
      - run:
          name: Show Xcode version
          command: xcodebuild -version
      - run:
          name: Authenticate to private gg-engineering Swift packages
          command: |
            # CI has no GitHub credentials by default; inject a read-only token for HTTPS clones.
            if [ -z "$GITHUB_PACKAGES_TOKEN" ]; then
              echo "Error: GITHUB_PACKAGES_TOKEN is not set. Add it as a CircleCI project/context secret."
              exit 1
            fi
            git config --global url."https://x-access-token:${GITHUB_PACKAGES_TOKEN}@github.com/".insteadOf "https://github.com/"
            echo "Configured git to authenticate github.com HTTPS clones."
      # Reuse cloned/resolved packages; keyed on the committed Package.resolved with a partial fallback.
      - restore_cache:
          name: Restore SPM cache
          keys:
            - spm-v2-{{ checksum "iOS/meApp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved" }}
            - spm-v2-
      - run:
          name: Resolve Swift Package Dependencies
          working_directory: iOS
          no_output_timeout: 20m
          # Package.resolved is committed; resolve only its pinned versions (skip the solver).
          command: |
            xcodebuild -resolvePackageDependencies \
              -project meApp.xcodeproj \
              -onlyUsePackageVersionsFromResolvedFile \
              -clonedSourcePackagesDirPath SourcePackages
      - save_cache:
          name: Save SPM cache
          key: spm-v2-{{ checksum "iOS/meApp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved" }}
          paths:
            - iOS/SourcePackages
            - ~/Library/Caches/org.swift.swiftpm
      - restore_cache:
          name: Restore DerivedData
          keys:
            - dd-v2-{{ .Branch }}-
            - dd-v2-
      - run:
          name: Build project
          working_directory: iOS
          no_output_timeout: 30m
          # "Dev" is the debug configuration — the project has no "Debug" config.
          command: |
            xcodebuild build \
              -project meApp.xcodeproj \
              -scheme meApp \
              -destination 'generic/platform=iOS' \
              -configuration Dev \
              -onlyUsePackageVersionsFromResolvedFile \
              -disableAutomaticPackageResolution \
              -clonedSourcePackagesDirPath SourcePackages \
              -derivedDataPath DerivedData \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ENABLE_USER_SCRIPT_SANDBOXING=NO
      - save_cache:
          name: Save DerivedData
          key: dd-v2-{{ .Branch }}-{{ .Revision }}
          paths:
            - iOS/DerivedData

  # ios-unit-tests — run meAppTests on the iPhone 16 simulator with a coverage gate.
  # The BLE + WiFi native packages don't build for the simulator on their shipping
  # branches (ggWifiScalePackage=main, ggBluetoothNativeLibrary=dev), so this job — and
  # ONLY this job — repoints those two at their `simulator-support` branch on the
  # throwaway CI checkout, then re-resolves. The committed project keeps main/dev for
  # device + App Store builds; nothing here is committed back.
  ios-unit-tests:
    macos:
      xcode: "16.4.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - run:
          name: Skip if no iOS changes
          command: |
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only HEAD)
            if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qE "^iOS/|^\.circleci/"; then
              echo "No iOS changes detected, skipping job."
              circleci-agent step halt
            fi
      - run:
          name: Restore GoogleService-Info.plist
          command: |
            if [ -z "$GOOGLESERVICE_INFO_BASE64" ]; then
              echo "Error: GOOGLESERVICE_INFO_BASE64 is not set. Add it as a CircleCI project/context secret (base64-encoded GoogleService-Info.plist)."
              exit 1
            fi
            if ! echo "$GOOGLESERVICE_INFO_BASE64" | base64 -D > iOS/meApp/Resources/GoogleService-Info.plist; then
              echo "Error: Failed to decode GOOGLESERVICE_INFO_BASE64."
              exit 1
            fi
            if ! plutil -lint iOS/meApp/Resources/GoogleService-Info.plist >/dev/null 2>&1; then
              echo "Error: Decoded GoogleService-Info.plist is not valid XML/plist."
              exit 1
            fi
            echo "GoogleService-Info.plist restored and validated."
      - run:
          name: Authenticate to private gg-engineering Swift packages
          command: |
            # Same read-only token the build job uses; needed to clone the simulator-support branches too.
            if [ -z "$GITHUB_PACKAGES_TOKEN" ]; then
              echo "Error: GITHUB_PACKAGES_TOKEN is not set. Add it as a CircleCI project/context secret."
              exit 1
            fi
            git config --global url."https://x-access-token:${GITHUB_PACKAGES_TOKEN}@github.com/".insteadOf "https://github.com/"
            echo "Configured git to authenticate github.com HTTPS clones."
      - run:
          name: Repoint BLE + WiFi packages at simulator-support (CI-only)
          working_directory: iOS
          command: |
            # Scope to the exact pbxproj object IDs — three OTHER packages also track
            # `branch = main`, so a blind sed would move them too. PlistBuddy edits ONLY
            # these two requirement blocks. This mutates the throwaway CI checkout only;
            # the committed project keeps ggWifiScalePackage=main, ggBluetoothNativeLibrary=dev.
            /usr/libexec/PlistBuddy \
              -c "Set :objects:10D170662E30E1AF00D18116:requirement:branch simulator-support" \
              -c "Set :objects:10E5F8EA2F2DCF82001C1DD3:requirement:branch simulator-support" \
              meApp.xcodeproj/project.pbxproj
            echo "ggWifiScalePackage + ggBluetoothNativeLibrary repointed to simulator-support."
      - run:
          name: Resolve Swift Package Dependencies (solver on)
          working_directory: iOS
          # Solver must run (NO -onlyUsePackageVersionsFromResolvedFile): the committed
          # Package.resolved pins the two packages to main/dev, which no longer satisfies
          # the simulator-support requirement. Keeping Package.resolved on disk means only
          # those two re-resolve; every other dependency stays on its committed pin. 45m
          # guards the cold clone of the Firebase + swift-syntax + gg-* graph.
          no_output_timeout: 45m
          command: |
            xcodebuild -resolvePackageDependencies \
              -project meApp.xcodeproj \
              -clonedSourcePackagesDirPath SourcePackages
      - run:
          name: Run unit tests with coverage (iPhone 16 simulator)
          working_directory: iOS
          no_output_timeout: 30m
          # -configuration Dev is required: the scheme's default test config is Production
          # (release, built -O with ENABLE_TESTABILITY=NO), which fails every `@testable import
          # meApp` with "module 'meApp' was not compiled for testing". Dev is the project's debug
          # config (ENABLE_TESTABILITY=YES) — the same config the build job uses. The project has
          # no "Debug" config, only Dev/Production.
          command: |
            xcrun simctl boot "iPhone 16" || true
            xcodebuild test \
              -project meApp.xcodeproj \
              -scheme meApp \
              -configuration Dev \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              -only-testing:meAppTests \
              -onlyUsePackageVersionsFromResolvedFile \
              -disableAutomaticPackageResolution \
              -clonedSourcePackagesDirPath SourcePackages \
              -enableCodeCoverage YES \
              -resultBundlePath TestResults.xcresult \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ENABLE_USER_SCRIPT_SANDBOXING=NO
      - run:
          name: Check coverage threshold (80% on the app target)
          working_directory: iOS
          command: |
            xcrun xccov view --report --json TestResults.xcresult > coverage.json
            COVERAGE=$(python3 -c "
            import json
            d = json.load(open('coverage.json'))
            # Use the app target's coverage, not the whole-report figure (diluted by SPM +
            # test targets). Fall back to overall if the app target isn't found.
            app = [t for t in d.get('targets', []) if t.get('name','').startswith('meApp') and t.get('name','').endswith('.app')]
            cov = app[0]['lineCoverage'] if app else d['lineCoverage']
            print(f'{cov*100:.1f}')
            ")
            echo "App-target line coverage: ${COVERAGE}%"
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then
              echo "ERROR: Coverage ${COVERAGE}% is below the 80% threshold."
              exit 1
            fi
      - store_test_results:
          path: iOS/TestResults.xcresult
      - store_artifacts:
          path: iOS/TestResults.xcresult
          destination: test-results

  # ios-dependency-audit — verify every SPM pin is reproducible (a version or an exact commit)
  ios-dependency-audit:
    macos:
      xcode: "16.4.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - run:
          name: Skip if no iOS changes
          command: |
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only HEAD)
            if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qE "^iOS/|^\.circleci/"; then
              echo "No iOS changes detected, skipping job."
              circleci-agent step halt
            fi
      - run:
          name: Audit SPM Dependencies
          working_directory: iOS
          command: |
            if [ -f "meApp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved" ]; then
              RESOLVED="meApp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved"
            elif [ -f "Package.resolved" ]; then
              RESOLVED="Package.resolved"
            else
              echo "No Package.resolved found, skipping dependency audit"
              exit 0
            fi
            echo "Checking $RESOLVED for pinned versions..."
            python3 -c "
            import json, sys
            with open('$RESOLVED') as f:
                resolved = json.load(f)
            pins = resolved.get('pins', resolved.get('object', {}).get('pins', []))
            unpinned = []
            branch_tracked = []
            for pin in pins:
                pkg = pin.get('identity', pin.get('package', 'unknown'))
                state = pin.get('state', {})
                version = state.get('version')
                revision = state.get('revision')
                branch = state.get('branch')
                # A pin is reproducible if it has a semver tag OR an exact commit.
                if version:
                    display = version
                elif revision:
                    display = revision[:12]
                    if branch:
                        display = display + ' (branch: ' + branch + ')'
                        branch_tracked.append(pkg)
                else:
                    display = 'UNPINNED'
                    unpinned.append(pkg)
                print('  ' + pkg + ': ' + display)
            if branch_tracked:
                print('\nNOTE: branch-tracked (pinned to a commit, but the branch can advance on re-resolve): ' + ', '.join(branch_tracked))
            if unpinned:
                print('\nERROR: truly unpinned dependencies (no version and no revision): ' + ', '.join(unpinned))
                sys.exit(1)
            print('\nAll dependencies are pinned to a version or an exact commit.')
            "

  # android-build — assemble the debug APK
  android-build:
    docker:
      - image: cimg/android:2024.11.1
    resource_class: large
    steps:
      - checkout
      - run:
          name: Skip if no Android changes
          command: |
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only HEAD)
            if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qE "^Android/|^\.circleci/"; then
              echo "No Android changes detected, skipping job."
              circleci-agent step halt
            fi
      - restore_cache:
          keys:
            - gradle-v1-{{ checksum "Android/gradle/libs.versions.toml" }}-{{ checksum "Android/app/build.gradle.kts" }}
            - gradle-v1-{{ checksum "Android/gradle/libs.versions.toml" }}-
            - gradle-v1-
      - restore_google_services
      - setup_github_packages_auth
      - run:
          name: Build Android debug APK
          working_directory: Android
          command: ./gradlew assembleDebug
      - save_cache:
          key: gradle-v1-{{ checksum "Android/gradle/libs.versions.toml" }}-{{ checksum "Android/app/build.gradle.kts" }}
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
            - ~/.gradle/build-cache

  # android-lint — Android lint + Detekt static analysis
  android-lint:
    docker:
      - image: cimg/android:2024.11.1
    resource_class: large
    steps:
      - checkout
      - run:
          name: Skip if no Android changes
          command: |
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only HEAD)
            if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qE "^Android/|^\.circleci/"; then
              echo "No Android changes detected, skipping job."
              circleci-agent step halt
            fi
      - restore_cache:
          keys:
            - gradle-v1-{{ checksum "Android/gradle/libs.versions.toml" }}-{{ checksum "Android/app/build.gradle.kts" }}
            - gradle-v1-{{ checksum "Android/gradle/libs.versions.toml" }}-
            - gradle-v1-
      - restore_google_services
      - setup_github_packages_auth
      - run:
          name: Run Android lint
          working_directory: Android
          command: ./gradlew lint
      - run:
          name: Run Detekt static analysis
          working_directory: Android
          command: ./gradlew detekt
      - store_artifacts:
          path: Android/app/build/reports/lint-results-debug.html
          destination: lint-reports
      - store_artifacts:
          path: Android/app/build/reports/detekt
          destination: detekt-reports

  # android-test — unit tests + JaCoCo 80% line-coverage gate
  android-test:
    docker:
      - image: cimg/android:2024.11.1
    resource_class: large
    steps:
      - checkout
      - run:
          name: Skip if no Android changes
          command: |
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only HEAD)
            if [ -n "$CHANGED" ] && ! echo "$CHANGED" | grep -qE "^Android/|^\.circleci/"; then
              echo "No Android changes detected, skipping job."
              circleci-agent step halt
            fi
      - restore_cache:
          keys:
            - gradle-v1-{{ checksum "Android/gradle/libs.versions.toml" }}-{{ checksum "Android/app/build.gradle.kts" }}
            - gradle-v1-{{ checksum "Android/gradle/libs.versions.toml" }}-
            - gradle-v1-
      - restore_google_services
      - setup_github_packages_auth
      - run:
          name: Run Android unit tests with coverage verification
          working_directory: Android
          command: ./gradlew test :app:jacocoTestReport :app:jacocoTestCoverageVerification
      - store_test_results:
          path: Android/app/build/test-results
      - store_artifacts:
          path: Android/app/build/reports/jacoco/jacocoTestReport/html
          destination: coverage-report

  # android-owasp-scan — weekly OWASP dependency vulnerability scan
  android-owasp-scan:
    docker:
      - image: cimg/android:2024.11.1
    resource_class: large
    steps:
      - checkout
      - restore_google_services
      - setup_github_packages_auth
      - run:
          name: Run OWASP Dependency Check
          working_directory: Android
          command: ./gradlew dependencyCheckAnalyze
          no_output_timeout: 30m
      - store_artifacts:
          path: Android/build/reports/dependency-check
          destination: owasp-reports

workflows:
  version: 2
  build-and-test:
    jobs:
      - gitleaks
      # iOS — filtered to develop, main, MA-*, MOB-*
      - ios-swiftlint:
          filters:
            branches:
              only:
                - develop
                - main
                - /^MA-.*$/
                - /^MOB-.*$/
      - ios-build:
          filters:
            branches:
              only:
                - develop
                - main
                - /^MA-.*$/
                - /^MOB-.*$/
      - ios-unit-tests:
          requires:
            - ios-build
          filters:
            branches:
              only:
                - develop
                - main
                - /^MA-.*$/
                - /^MOB-.*$/
      - ios-dependency-audit:
          filters:
            branches:
              only:
                - develop
                - main
                - /^MA-.*$/
                - /^MOB-.*$/
      # Android — same branch filters
      - android-build:
          filters:
            branches:
              only:
                - develop
                - main
                - /^MA-.*$/
                - /^MOB-.*$/
      - android-lint:
          filters:
            branches:
              only:
                - develop
                - main
                - /^MA-.*$/
                - /^MOB-.*$/
      - android-test:
          filters:
            branches:
              only:
                - develop
                - main
                - /^MA-.*$/
                - /^MOB-.*$/

  scheduled-security:
    triggers:
      - schedule:
          cron: "0 9 * * 1"
          filters:
            branches:
              only: main
    jobs:
      - android-owasp-scan
